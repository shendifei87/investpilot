name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Ensure CLI tools available
        run: uv pip install ruff mypy pytest-cov

      - name: Ruff check
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy src/ config/ --ignore-missing-imports
        continue-on-error: true

      - name: Pytest with coverage
        run: uv run pytest tests/ -v --tb=short -q --cov --cov-report=term-missing
        env:
          TUSHARE_TOKEN: ""

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test
